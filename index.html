<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Court Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-logo">🎾 CourtFinder</div>
    <div class="nav-links">
      <a href="#">Saved Courts</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Tennis Courts <span class="highlight">Near You</span></h1>
      <p class="hero-sub">Search free and paid courts, check opening hours, photos, and ratings — all in one place.</p>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="Enter a city, e.g. Los Angeles..."/>
        <button id="searchBtn">Find Courts</button>
      </div>
    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section class="results-section">
    <div class="results-grid" id="resultsGrid"></div>
  </section>

  <!-- MAP -->
  <div id="map"></div>

  <script>
    function initMap() {
      console.log('✅ Google Maps loaded!');

      const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 34.0522, lng: -118.2437 },
        zoom: 12
      });

      const resultsGrid = document.getElementById('resultsGrid');
      const searchBtn = document.getElementById('searchBtn');
      const cityInput = document.getElementById('cityInput');

      searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (!city) {
          cityInput.style.border = '2px solid red';
          return;
        }
        cityInput.style.border = 'none';
        resultsGrid.innerHTML = `<div class="loading-msg">Searching for courts in <strong>${city}</strong>...</div>`;

        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: city }, (results, status) => {
          console.log('Geocode status:', status);
          if (status !== 'OK') {
            resultsGrid.innerHTML = `<div class="error-msg">City not found.</div>`;
            return;
          }

          const location = results[0].geometry.location;
          console.log('Location:', location.lat(), location.lng());
          map.setCenter(location);

          const service = new google.maps.places.PlacesService(map);
          const request = {
            location: location,
            radius: 5000,
            keyword: 'tennis court'
          };

          service.nearbySearch(request, (places, status) => {
            console.log('Places status:', status);
            console.log('Places result:', places);

            if (status !== 'OK' || !places || !places.length) {
              resultsGrid.innerHTML = `<div class="error-msg">No courts found near ${city}. Status: ${status}</div>`;
              return;
            }

            resultsGrid.innerHTML = '';
            places.forEach(court => {
              const photo = court.photos
                ? court.photos[0].getUrl({ maxWidth: 400 })
                : 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400';

              const stars = court.rating
                ? '★'.repeat(Math.round(court.rating)) + '☆'.repeat(5 - Math.round(court.rating))
                : '☆☆☆☆☆';

              const isOpen = court.opening_hours?.open_now;
              const openBadge = isOpen === true
                ? `<span class="badge-open">Open Now</span>`
                : isOpen === false
                ? `<span class="badge-closed">Closed</span>`
                : `<span class="surface-tag">Hours N/A</span>`;

              resultsGrid.innerHTML += `
                <div class="court-card">
                  <div class="card-image">
                    <img src="${photo}" alt="${court.name}"/>
                    <span class="badge-free">Public</span>
                  </div>
                  <div class="card-body">
                    <h3 class="court-name">${court.name}</h3>
                    <p class="court-address">${court.vicinity}</p>
                    <div class="card-row">
                      <div class="stars">${stars}</div>
                      <span class="rating-count">(${court.user_ratings_total || 0} reviews)</span>
                    </div>
                    <div class="card-row">
                      ${openBadge}
                      <span class="surface-tag">Tennis Court</span>
                    </div>
                  </div>
                </div>
              `;
            });
          });
        });
      });
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHq7QJIROeH2ZphtL07WQKLWK2Z9ELmZU&libraries=places&callback=initMap" async defer></script>
</body>
</html>
