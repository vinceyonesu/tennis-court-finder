<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Court Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-logo">🎾 CourtFinder</div>
    <div class="nav-links">
      <a href="#">Saved Courts</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Tennis Courts <span class="highlight">Near You</span></h1>
      <p class="hero-sub">Search free and paid courts, check opening hours, photos, and ratings — all in one place.</p>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="Enter a city, e.g. Los Angeles..."/>
        <button id="searchBtn">Find Courts</button>
      </div>
    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section class="results-section">
    <div class="results-grid" id="resultsGrid">

      <!-- SAMPLE CARD -->
      <div class="court-card">
        <div class="card-image">
          <img src="https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400" alt="Tennis Court"/>
          <span class="badge-free">Free</span>
        </div>
        <div class="card-body">
          <h3 class="court-name">Griffith Park Tennis Courts</h3>
          <p class="court-address">Los Angeles, CA</p>
          <div class="card-row">
            <div class="stars">★★★★☆</div>
            <span class="rating-count">(124 reviews)</span>
          </div>
          <div class="card-row">
            <span class="badge-open">Open Now</span>
            <span class="surface-tag">Hard Court</span>
          </div>
          <div class="card-hours">Mon–Sun: 7:00 AM – 9:00 PM</div>
        </div>
      </div>

    </div>
  </section>

  <!-- MAP -->
  <div id="map"></div>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHq7QJIROeH2ZphtL07WQKLWK2Z9ELmZU&libraries=places"></script>
  <script src="app.js"></script>
</body>
</html>
