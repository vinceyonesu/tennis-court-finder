<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Court Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-logo">🎾 CourtFinder</div>
    <div class="nav-links">
      <a href="#">Saved Courts</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <h1>Find Tennis Courts <span class="highlight">Near You</span></h1>
      <p class="hero-sub">Search free and paid courts, check opening hours, photos, and ratings — all in one place.</p>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="Enter a city, e.g. Los Angeles..."/>
        <button id="searchBtn">Find Courts</button>
      </div>
    </div>
  </section>

  <!-- RESULTS SECTION -->
  <section class="results-section">
    <div class="results-grid" id="resultsGrid"></div>
  </section>

  <!-- MODAL -->
  <div id="courtModal" class="modal-overlay">
    <div class="modal-card">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-image">
        <img id="modalPhoto" src="" alt="Court photo"/>
      </div>
      <div class="modal-body">
        <h2 id="modalName"></h2>
        <p id="modalAddress" class="modal-address"></p>
        <div class="modal-meta">
          <span id="modalStatus"></span>
          <span id="modalRating"></span>
        </div>
        <div id="modalHours" class="modal-hours"></div>
        <a id="modalDirections" href="#" target="_blank" class="directions-btn">Get Directions</a>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-section">
    <div id="map"></div>
  </div>

  <script>
    const courtDataStore = {};

    function openModal(id) {
      const data = courtDataStore[id];
      if (!data) return;

      document.getElementById('modalPhoto').src = data.photo;
      document.getElementById('modalName').textContent = data.name;
      document.getElementById('modalAddress').textContent = data.address;

      const stars = data.rating
        ? '★'.repeat(Math.round(data.rating)) + '☆'.repeat(5 - Math.round(data.rating))
        : '☆☆☆☆☆';

      document.getElementById('modalRating').innerHTML =
        `<span style="color:#f4a800;font-size:16px">${stars}</span>
         <span style="font-size:13px;color:#999;margin-left:6px">(${data.reviews} reviews)</span>`;

      const statusEl = document.getElementById('modalStatus');
      if (data.isOpen === true) {
        statusEl.innerHTML = '<span class="badge-open">Open Now</span>';
      } else if (data.isOpen === false) {
        statusEl.innerHTML = '<span class="badge-closed">Closed</span>';
      } else {
        statusEl.innerHTML = '<span class="surface-tag">Hours N/A</span>';
      }

      document.getElementById('modalHours').innerHTML =
        '<strong>Address:</strong> ' + data.address;

      document.getElementById('modalDirections').href =
        'https://www.google.com/maps/dir/?api=1&destination=' +
        encodeURIComponent(data.address) +
        '&destination_place_id=' + data.placeId;

      document.getElementById('courtModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('modalClose').addEventListener('click', () => {
        document.getElementById('courtModal').classList.remove('active');
        document.body.style.overflow = '';
      });

      document.getElementById('courtModal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('courtModal')) {
          document.getElementById('courtModal').classList.remove('active');
          document.body.style.overflow = '';
        }
      });
    });

    function initMap() {
      console.log('✅ Google Maps loaded!');

      const map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 34.0522, lng: -118.2437 },
        zoom: 12
      });

      const resultsGrid = document.getElementById('resultsGrid');
      const searchBtn = document.getElementById('searchBtn');
      const cityInput = document.getElementById('cityInput');

      searchBtn.addEventListener('click', () => {
        const city = cityInput.value.trim();
        if (!city) {
          cityInput.style.border = '2px solid red';
          return;
        }
        cityInput.style.border = 'none';
        resultsGrid.innerHTML = `<div class="loading-msg">Searching for courts in <strong>${city}</strong>...</div>`;

        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: city }, (results, status) => {
          if (status !== 'OK') {
            resultsGrid.innerHTML = `<div class="error-msg">City not found.</div>`;
            return;
          }

          const location = results[0].geometry.location;
          map.setCenter(location);

          const service = new google.maps.places.PlacesService(map);
          const request = { location, radius: 5000, keyword: 'tennis court' };

          service.nearbySearch(request, (places, status) => {
            if (status !== 'OK' || !places || !places.length) {
              resultsGrid.innerHTML = `<div class="error-msg">No courts found near ${city}.</div>`;
              return;
            }

            resultsGrid.innerHTML = '';
            const bounds = new google.maps.LatLngBounds();

            places.forEach((court, index) => {
              const photo = court.photos
                ? court.photos[0].getUrl({ maxWidth: 400 })
                : 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400';

              const stars = court.rating
                ? '★'.repeat(Math.round(court.rating)) + '☆'.repeat(5 - Math.round(court.rating))
                : '☆☆☆☆☆';

              const isOpen = court.opening_hours?.open_now;
              const openBadge = isOpen === true
                ? `<span class="badge-open">Open Now</span>`
                : isOpen === false
                ? `<span class="badge-closed">Closed</span>`
                : `<span class="surface-tag">Hours N/A</span>`;

              const id = 'court_' + index;
              courtDataStore[id] = {
                name: court.name,
                address: court.vicinity,
                photo: photo,
                rating: court.rating || null,
                reviews: court.user_ratings_total || 0,
                isOpen: isOpen,
                placeId: court.place_id
              };

              resultsGrid.innerHTML += `
                <div class="court-card" onclick="openModal('${id}')" style="cursor:pointer">
                  <div class="card-image">
                    <img src="${photo}" alt="${court.name}"/>
                    <span class="badge-free">Public</span>
                  </div>
                  <div class="card-body">
                    <h3 class="court-name">${court.name}</h3>
                    <p class="court-address">${court.vicinity}</p>
                    <div class="card-row">
                      <div class="stars">${stars}</div>
                      <span class="rating-count">(${court.user_ratings_total || 0} reviews)</span>
                    </div>
                    <div class="card-row">
                      ${openBadge}
                      <span class="surface-tag">Tennis Court</span>
                    </div>
                  </div>
                </div>
              `;

              new google.maps.Marker({
                position: court.geometry.location,
                map: map,
                title: court.name
              });

              bounds.extend(court.geometry.location);
            });

            map.fitBounds(bounds);
          });
        });
      });
    }
  </script>

  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDHq7QJIROeH2ZphtL07WQKLWK2Z9ELmZU&libraries=places&callback=initMap" async defer></script>
</body>
</html>
