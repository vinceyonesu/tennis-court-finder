<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tennis Court Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-logo" onclick="showSearch()" style="cursor:pointer">🎾 CourtFinder</div>
    <div class="nav-links">
      <a href="#" id="navSaved" onclick="showSaved()">Saved Courts <span id="savedCount" class="saved-count">0</span></a>
      <a href="#" id="navSearch" onclick="showSearch()">Search</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero" id="heroSection">
    <div class="hero-content">
      <h1>Find Tennis Courts <span class="highlight">Near You</span></h1>
      <p class="hero-sub">Search free and paid courts, check opening hours, photos, and ratings — all in one place.</p>
      <div class="search-bar">
        <input type="text" id="cityInput" placeholder="Enter a city, e.g. Los Angeles..."/>
        <button id="searchBtn">Find Courts</button>
      </div>
      <button id="nearMeBtn" onclick="findNearMe()" style="margin-top:14px;background:rgba(255,255,255,0.15);color:#ffffff;border:2px solid rgba(255,255,255,0.5);border-radius:50px;padding:10px 24px;font-size:14px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:all 0.2s ease">
        📍 Use My Location
      </button>
    </div>
  </section>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filterBar" style="display:none">
    <button class="filter-btn active" id="filterAll" onclick="applyFilter('all')">All Courts</button>
    <button class="filter-btn" id="filterOpen" onclick="applyFilter('open')">Open Now</button>
    <button class="filter-btn" id="filterLights" onclick="applyFilter('lights')">Lights Available</button>
    <div class="filter-divider"></div>
    <select class="filter-select" id="sortSelect" onchange="applySort()">
      <option value="default">Sort: Default</option>
      <option value="rating">Sort: Best Rated</option>
      <option value="reviews">Sort: Most Reviews</option>
    </select>
  </div>

  <!-- RESULTS SECTION -->
  <section class="results-section">
    <div class="results-grid" id="resultsGrid"></div>
  </section>

  <!-- SAVED COURTS SECTION -->
  <section class="results-section" id="savedSection" style="display:none">
    <div style="max-width:1200px;margin:0 auto;padding:0 24px 20px">
      <h2 style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px">Saved Courts</h2>
      <p style="font-size:14px;color:#888;margin-bottom:24px">Your favorited courts — click any to view details</p>
    </div>
    <div class="results-grid" id="savedGrid"></div>
  </section>

  <!-- MODAL -->
  <div id="courtModal" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-image">
        <img id="modalPhoto" src="" alt="Court photo"/>
        <button class="modal-close" id="modalClose">✕</button>
        <button class="heart-btn" id="modalHeart" onclick="toggleFavoriteFromModal()">♡</button>
      </div>
      <div class="modal-body">
        <h2 id="modalName"></h2>
        <p id="modalAddress" class="modal-address"></p>
        <div class="modal-meta">
          <span id="modalStatus"></span>
          <span id="modalRating"></span>
        </div>
        <div id="weatherSection"></div>
        <div id="modalHours" class="modal-hours"></div>
         <div id="hittingPartnerSection"></div>
        <a id="modalDirections" href="#" target="_blank" class="directions-btn">Get Directions</a>
      </div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-section">
    <div id="map"></div>
  </div>

  <script>
    var courtDataStore = {};
    var allCourts = [];
    var gService = null;
    var currentFilter = 'all';
    var currentModalId = null;
    var favorites = JSON.parse(localStorage.getItem('courtFavorites') || '{}');
    var activeInfoWindow = null;

    window.openModal = function(id) {
      var data = courtDataStore[id] || favorites[id];
      if (!data) return;
      currentModalId = id;
      document.getElementById('modalPhoto').src = data.photo;
      document.getElementById('modalName').textContent = data.name;
      document.getElementById('modalAddress').textContent = data.address;
      var isFav = !!favorites[id];
      var modalHeart = document.getElementById('modalHeart');
      modalHeart.textContent = isFav ? '♥' : '♡';
      modalHeart.style.color = isFav ? '#e74c3c' : '#fff';
      var stars = data.rating ? '★'.repeat(Math.round(data.rating)) + '☆'.repeat(5 - Math.round(data.rating)) : '☆☆☆☆☆';
      document.getElementById('modalRating').innerHTML =
        '<span style="color:#f4a800;font-size:16px">' + stars + '</span>' +
        '<span style="font-size:13px;color:#999;margin-left:6px">(' + data.reviews + ' reviews)</span>';
      var statusEl = document.getElementById('modalStatus');
      if (data.isOpen === true) { statusEl.innerHTML = '<span class="badge-open">Open Now</span>'; }
      else if (data.isOpen === false) { statusEl.innerHTML = '<span class="badge-closed">Closed</span>'; }
      else { statusEl.innerHTML = '<span class="surface-tag">Hours N/A</span>'; }
      document.getElementById('modalHours').innerHTML = '<p style="color:#888;font-size:13px">Loading hours...</p>';
      document.getElementById('weatherSection').innerHTML = '';
      document.getElementById('modalDirections').href =
        'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(data.address) + '&destination_place_id=' + data.placeId;
      document.getElementById('courtModal').classList.add('active');
      document.body.style.overflow = 'hidden';
      getCourtWeather(data);
       var fbWait = setInterval(function() {
  if (window._db) {
    clearInterval(fbWait);
    loadHittingPartnerSection(data.placeId);
  }
}, 200);
setTimeout(function() { clearInterval(fbWait); }, 5000);
      if (gService && data.placeId) {
        gService.getDetails(
          { placeId: data.placeId, fields: ['opening_hours', 'formatted_phone_number', 'website'] },
          function(place, status) {
            var hoursDiv = document.getElementById('modalHours');
            var html = '';
            var lightsTag = data.lights ? '<span class="lights-badge">Lights available</span>' : '<span class="no-lights-badge">No lights info</span>';
            html += '<div style="margin-bottom:10px">' + lightsTag + '</div>';
            if (status !== 'OK' || !place || !place.opening_hours) {
              html += '<p style="color:#888;font-size:13px">Hours not available.</p>';
              hoursDiv.innerHTML = html; return;
            }
            var today = new Date().getDay();
            var weekdayText = place.opening_hours.weekday_text;
            html += '<table style="width:100%;font-size:13px;border-collapse:collapse">';
            weekdayText.forEach(function(line, i) {
              var dayIndex = (i + 1) % 7, isToday = dayIndex === today;
              var parts = line.split(': '), dayName = parts[0], hours = parts.slice(1).join(': ') || 'Closed';
              html += '<tr style="background:' + (isToday ? '#e6f9ee' : 'transparent') + '">' +
                '<td style="padding:5px 8px;font-weight:' + (isToday ? '700' : '400') + ';color:' + (isToday ? '#1a6b3c' : '#444') + '">' + dayName + '</td>' +
                '<td style="padding:5px 8px;text-align:right;color:' + (isToday ? '#1a6b3c' : '#666') + ';font-weight:' + (isToday ? '700' : '400') + '">' + hours + '</td></tr>';
            });
            html += '</table>';
            if (place.formatted_phone_number) html += '<p style="margin-top:10px;font-size:13px;color:#555">Phone: ' + place.formatted_phone_number + '</p>';
            if (place.website) html += '<p style="margin-top:4px;font-size:13px"><a href="' + place.website + '" target="_blank" style="color:#1a6b3c">Visit website</a></p>';
            hoursDiv.innerHTML = html;
          }
        );
      }
    };
window.postSession = async function(placeId) {
  var name = document.getElementById('sessionName').value.trim();
  var date = document.getElementById('sessionDate').value;
  var time = document.getElementById('sessionTime').value;
  var skill = document.getElementById('sessionSkill').value;
  var type = document.getElementById('sessionType').value;

  if (!name || !date || !time) {
    alert('Please fill in your name, date, and time.');
    return;
  }

  var btn = document.getElementById('postSessionBtn');
  btn.textContent = 'Posting...';
  btn.disabled = true;

  try {
    await window._fbAddDoc(window._fbCollection(window._db, 'sessions'), {
      placeId: placeId,
      name: name,
      date: date,
      time: time,
      skill: skill,
      type: type,
      players: [name],
      createdAt: window._fbTimestamp.now()
    });
    document.getElementById('sessionName').value = '';
    document.getElementById('sessionDate').value = '';
    document.getElementById('sessionTime').value = '';
    btn.textContent = 'Post Session';
    btn.disabled = false;
    loadSessions(placeId);
  } catch (err) {
    console.log('Error posting session:', err);
    btn.textContent = 'Post Session';
    btn.disabled = false;
    alert('Could not post session. Try again.');
  }
};

window.joinSession = async function(sessionId, placeId) {
  var name = prompt('Enter your name to join this session:');
  if (!name || !name.trim()) return;
  try {
    var sessionRef = window._fbDoc(window._db, 'sessions', sessionId);
    await window._fbUpdateDoc(sessionRef, {
      players: window._fbArrayUnion(name.trim())
    });
    loadSessions(placeId);
  } catch (err) {
    console.log('Error joining session:', err);
    alert('Could not join session. Try again.');
  }
};

async function loadSessions(placeId) {
  var sessionsList = document.getElementById('sessionsList');
  if (!sessionsList || !window._db) return;
  sessionsList.innerHTML = '<p style="font-size:12px;color:#888;text-align:center;padding:8px">Loading sessions...</p>';

  try {
    var today = new Date().toISOString().split('T')[0];
    var q = window._fbQuery(
      window._fbCollection(window._db, 'sessions'),
      window._fbWhere('placeId', '==', placeId),
      window._fbWhere('date', '>=', today),
      window._fbOrderBy('date', 'asc')
    );
    var snapshot = await window._fbGetDocs(q);
    if (snapshot.empty) {
      sessionsList.innerHTML = '<div class="no-sessions">No sessions posted yet. Be the first!</div>';
      return;
    }
    sessionsList.innerHTML = '';
    snapshot.forEach(function(docSnap) {
      var s = docSnap.data();
      var dateStr = new Date(s.date + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
      var timeStr = new Date('2000-01-01T' + s.time).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      var playersCount = s.players ? s.players.length : 1;
      var playerNames = s.players ? s.players.join(', ') : s.name;
      sessionsList.innerHTML +=
        '<div class="session-card">' +
          '<div class="session-name">' + s.name + ' is playing</div>' +
          '<div class="session-details">' +
            '📅 ' + dateStr + ' at ' + timeStr + '<br>' +
            '🎾 ' + s.type + ' · ' + s.skill + '<br>' +
            '👥 ' + playerNames +
          '</div>' +
          '<div class="session-footer">' +
            '<span class="session-players">' + playersCount + ' player' + (playersCount !== 1 ? 's' : '') + ' going</span>' +
            '<button class="join-btn" onclick="joinSession(\'' + docSnap.id + '\', \'' + placeId + '\')">I\'m In!</button>' +
          '</div>' +
        '</div>';
    });
  } catch (err) {
    console.log('Error loading sessions:', err);
    sessionsList.innerHTML = '<div class="no-sessions">Could not load sessions.</div>';
  }
}

function loadHittingPartnerSection(placeId) {
  var section = document.getElementById('hittingPartnerSection');
  if (!section) return;
  if (!window._db) {
    section.innerHTML = '<p style="font-size:12px;color:#888;padding:10px">Connecting to database...</p>';
    return;
  }

  var today = new Date().toISOString().split('T')[0];

  section.innerHTML =
    '<div class="hitting-section">' +
      '<div class="hitting-title">🎾 Find a Hitting Partner</div>' +
      '<div class="hitting-subtitle">Post your session or join someone already playing here</div>' +
      '<div class="hitting-form">' +
        '<input type="text" id="sessionName" placeholder="Your name"/>' +
        '<div class="hitting-form-row">' +
          '<input type="date" id="sessionDate" min="' + today + '"/>' +
          '<input type="time" id="sessionTime"/>' +
        '</div>' +
        '<div class="hitting-form-row">' +
          '<select id="sessionSkill">' +
            '<option value="Beginner">Beginner</option>' +
            '<option value="Intermediate" selected>Intermediate</option>' +
            '<option value="Advanced">Advanced</option>' +
          '</select>' +
          '<select id="sessionType">' +
            '<option value="Singles">Singles</option>' +
            '<option value="Doubles">Doubles</option>' +
            '<option value="Rally/Practice">Rally/Practice</option>' +
          '</select>' +
        '</div>' +
        '<button class="hitting-post-btn" id="postSessionBtn" onclick="postSession(\'' + placeId + '\')">Post My Session</button>' +
      '</div>' +
      '<div style="font-size:12px;font-weight:600;color:#555;margin-bottom:8px">Upcoming Sessions at This Court</div>' +
      '<div id="sessionsList"></div>' +
    '</div>';

  loadSessions(placeId);
}
    window.toggleHourly = function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      if (el.style.display === 'none' || el.style.display === '') {
        el.style.display = 'block';
      } else {
        el.style.display = 'none';
      }
    };

    window.findNearMe = function() {
      var btn = document.getElementById('nearMeBtn');
      var resultsGrid = document.getElementById('resultsGrid');
      if (!navigator.geolocation) { alert('Geolocation is not supported by your browser.'); return; }
      btn.textContent = '📍 Detecting location...';
      btn.style.opacity = '0.7';
      navigator.geolocation.getCurrentPosition(
        function(position) {
          btn.textContent = '📍 Use My Location';
          btn.style.opacity = '1';
          var lat = position.coords.latitude;
          var lng = position.coords.longitude;
          window._userLat = lat;
          window._userLng = lng;
          var geocoder = new google.maps.Geocoder();
          geocoder.geocode({ location: { lat: lat, lng: lng } }, function(results, status) {
            if (status === 'OK' && results[0]) {
              var city = results[0].address_components.find(function(c) { return c.types.includes('locality'); });
              if (city) document.getElementById('cityInput').value = city.long_name;
            }
          });
          resultsGrid.innerHTML = '<div class="loading-msg">Finding courts near your location...</div>';
          document.getElementById('filterBar').style.display = 'none';
          document.getElementById('heroSection').style.display = 'block';
          document.getElementById('resultsGrid').parentElement.style.display = 'block';
          document.getElementById('savedSection').style.display = 'none';
          var location = new google.maps.LatLng(lat, lng);
          if (window._courtMap) window._courtMap.setCenter(location);
          gService.nearbySearch({ location: location, radius: 5000, keyword: 'tennis court' }, function(places, status) {
            if (status !== 'OK' || !places || !places.length) {
              resultsGrid.innerHTML = '<div class="error-msg">No courts found near your location.</div>'; return;
            }
            allCourts = [];
            var bounds = new google.maps.LatLngBounds();
            places.forEach(function(court, index) {
              var photo = court.photos ? court.photos[0].getUrl({ maxWidth: 400 }) : 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400';
              var id = 'court_' + index;
              var courtObj = {
                id: id, name: court.name, address: court.vicinity, photo: photo,
                rating: court.rating || 0, reviews: court.user_ratings_total || 0,
                isOpen: court.opening_hours ? court.opening_hours.open_now : undefined,
                lights: hasLights(court), placeId: court.place_id,
                lat: court.geometry.location.lat(), lng: court.geometry.location.lng()
              };
              courtDataStore[id] = courtObj;
              allCourts.push(courtObj);
              if (window._courtMap) addMarker(court, courtObj, window._courtMap);
              bounds.extend(court.geometry.location);
            });
            if (window._courtMap) window._courtMap.fitBounds(bounds);
            document.getElementById('filterBar').style.display = 'flex';
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('filterAll').classList.add('active');
            renderCourts();
          });
        },
        function(error) {
          btn.textContent = '📍 Use My Location';
          btn.style.opacity = '1';
          if (error.code === error.PERMISSION_DENIED) {
            alert('Location access denied. Please allow location access in your browser settings.');
          } else {
            alert('Could not detect your location. Please search by city instead.');
          }
        },
        { timeout: 10000, enableHighAccuracy: true }
      );
    };

    window.applyFilter = function(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(function(btn) { btn.classList.remove('active'); });
      document.getElementById('filter' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('active');
      renderCourts();
    };

    window.applySort = function() { renderCourts(); };

    window.toggleFavoriteFromModal = function() {
      if (currentModalId) toggleFavorite(currentModalId);
    };

    function addMarker(court, courtObj, map) {
      var marker = new google.maps.Marker({
        position: court.geometry.location,
        map: map,
        title: court.name
      });
      var isOpen = courtObj.isOpen;
      var statusText = isOpen === true
        ? '<span style="color:#1a6b3c;font-weight:600;font-size:12px">● Open Now</span>'
        : isOpen === false
        ? '<span style="color:#c0392b;font-weight:600;font-size:12px">● Closed</span>'
        : '<span style="color:#888;font-size:12px">● Hours N/A</span>';
      var stars = courtObj.rating ? '★'.repeat(Math.round(courtObj.rating)) + '☆'.repeat(5 - Math.round(courtObj.rating)) : '☆☆☆☆☆';
      var infoContent =
        '<div style="width:220px;font-family:sans-serif;cursor:pointer" onclick="openModal(\'' + courtObj.id + '\')">' +
          '<img src="' + courtObj.photo + '" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px"/>' +
          '<div style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px">' + courtObj.name + '</div>' +
          '<div style="font-size:11px;color:#888;margin-bottom:6px">' + courtObj.address + '</div>' +
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">' +
            '<span style="color:#f4a800;font-size:13px">' + stars + '</span>' +
            statusText +
          '</div>' +
          '<div style="background:#1a6b3c;color:#fff;text-align:center;padding:7px;border-radius:8px;font-size:12px;font-weight:600">View Details</div>' +
        '</div>';
      var infoWindow = new google.maps.InfoWindow({ content: infoContent });
      marker.addListener('click', function() {
        if (activeInfoWindow) activeInfoWindow.close();
        infoWindow.open(map, marker);
        activeInfoWindow = infoWindow;
        var cardEl = document.getElementById('court_card_' + courtObj.id);
        if (cardEl) {
          cardEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
          cardEl.style.outline = '3px solid #1a6b3c';
          setTimeout(function() { cardEl.style.outline = 'none'; }, 2000);
        }
      });
    }

    function saveFavorites() {
      localStorage.setItem('courtFavorites', JSON.stringify(favorites));
      updateSavedCount();
    }

    function updateSavedCount() {
      var count = Object.keys(favorites).length;
      document.getElementById('savedCount').textContent = count;
      document.getElementById('savedCount').style.display = count > 0 ? 'inline-block' : 'none';
    }

    function toggleFavorite(id) {
      var data = courtDataStore[id];
      if (!data) return;
      if (favorites[id]) { delete favorites[id]; } else { favorites[id] = data; }
      saveFavorites();
      updateHeartButtons(id);
    }

    function updateHeartButtons(id) {
      var isFav = !!favorites[id];
      var cardHeart = document.getElementById('heart_' + id);
      if (cardHeart) { cardHeart.textContent = isFav ? '♥' : '♡'; cardHeart.style.color = isFav ? '#e74c3c' : '#fff'; }
      if (currentModalId === id) {
        var modalHeart = document.getElementById('modalHeart');
        if (modalHeart) { modalHeart.textContent = isFav ? '♥' : '♡'; modalHeart.style.color = isFav ? '#e74c3c' : '#fff'; }
      }
    }

    window.showSaved = function() {
      document.getElementById('heroSection').style.display = 'none';
      document.getElementById('filterBar').style.display = 'none';
      document.getElementById('resultsGrid').parentElement.style.display = 'none';
      document.getElementById('savedSection').style.display = 'block';
      document.getElementById('navSaved').style.color = '#1a6b3c';
      document.getElementById('navSearch').style.color = '#555';
      var savedGrid = document.getElementById('savedGrid');
      var keys = Object.keys(favorites);
      if (keys.length === 0) {
        savedGrid.innerHTML = '<div class="loading-msg" style="grid-column:1/-1">No saved courts yet. Search and click the heart to save courts!</div>';
        return;
      }
      savedGrid.innerHTML = '';
      keys.forEach(function(id) {
        var court = favorites[id];
        var stars = court.rating ? '★'.repeat(Math.round(court.rating)) + '☆'.repeat(5 - Math.round(court.rating)) : '☆☆☆☆☆';
        savedGrid.innerHTML +=
          '<div class="court-card" onclick="openModal(\'' + id + '\')" style="cursor:pointer">' +
            '<div class="card-image">' +
              '<img src="' + court.photo + '" alt="' + court.name + '"/>' +
              '<button class="heart-btn" id="heart_' + id + '" onclick="event.stopPropagation();toggleFavorite(\'' + id + '\')" style="color:#e74c3c">♥</button>' +
            '</div>' +
            '<div class="card-body">' +
              '<h3 class="court-name">' + court.name + '</h3>' +
              '<p class="court-address">' + court.address + '</p>' +
              '<div class="card-row"><div class="stars">' + stars + '</div><span class="rating-count">(' + court.reviews + ' reviews)</span></div>' +
            '</div>' +
          '</div>';
      });
    };

    window.showSearch = function() {
      document.getElementById('heroSection').style.display = 'block';
      document.getElementById('resultsGrid').parentElement.style.display = 'block';
      document.getElementById('savedSection').style.display = 'none';
      document.getElementById('navSaved').style.color = '#555';
      document.getElementById('navSearch').style.color = '#1a6b3c';
      if (allCourts.length > 0) document.getElementById('filterBar').style.display = 'flex';
    };

    function hasLights(court) {
      var name = (court.name || '').toLowerCase();
      var types = (court.types || []).join(' ').toLowerCase();
      return name.includes('light') || name.includes('lit') || types.includes('light');
    }

    function getDistance(lat1, lng1, lat2, lng2) {
      var R = 3958.8;
      var dLat = (lat2 - lat1) * Math.PI / 180;
      var dLng = (lng2 - lng1) * Math.PI / 180;
      var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng/2) * Math.sin(dLng/2);
      return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
    }

    function getWeatherIcon(code) {
      if (code === 0) return '☀️';
      if (code <= 3) return '⛅';
      if (code <= 49) return '🌫️';
      if (code <= 69) return '🌧️';
      if (code <= 79) return '❄️';
      if (code <= 82) return '🌦️';
      if (code <= 99) return '⛈️';
      return '🌤️';
    }

    function formatTime(isoString) {
      if (!isoString) return 'N/A';
      var d = new Date(isoString);
      var h = d.getHours(), m = d.getMinutes();
      var ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
    }

    async function getCourtWeather(court) {
      var weatherDiv = document.getElementById('weatherSection');
      weatherDiv.innerHTML =
        '<div style="background:#e8f4fd;border-radius:20px;padding:18px 20px;margin-bottom:20px;border:1px solid #b8d8f0;display:flex;align-items:center;gap:12px">' +
          '<span style="font-size:24px">⛅</span><span style="font-size:13px;color:#555">Loading 7-day forecast...</span>' +
        '</div>';
      try {
        var placeResult = await new Promise(function(resolve) {
          gService.getDetails({ placeId: court.placeId, fields: ['geometry'] }, function(place, status) {
            resolve({ place: place, status: status });

        });
        if (placeResult.status !== 'OK') { weatherDiv.innerHTML = ''; return; }
        var lat = placeResult.place.geometry.location.lat();
        var lng = placeResult.place.geometry.location.lng();
        var res = await fetch(
          'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
          '&current=temperature_2m,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,uv_index' +
          '&daily=temperature_2m_max,temperature_2m_min,weather_code,wind_speed_10m_max,uv_index_max,precipitation_sum,sunrise,sunset' +
          '&hourly=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,uv_index' +
          '&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=auto&forecast_days=7'
        );
        var data = await res.json();
        var cu = data.current, daily = data.daily, hourly = data.hourly;
        var temp = Math.round(cu.temperature_2m), wind = Math.round(cu.wind_speed_10m);
        var humidity = Math.round(cu.relative_humidity_2m), precip = cu.precipitation;
        var uv = Math.round(cu.uv_index || 0), code = cu.weather_code;
        var icon, condition, bg1, bg2;
        if (code === 0 && temp > 85) { icon='☀️'; condition='Hot & sunny'; bg1='#f7971e'; bg2='#ffd200'; }
        else if (code === 0) { icon='☀️'; condition='Clear sky'; bg1='#56CCF2'; bg2='#2F80ED'; }
        else if (code <= 3) { icon='⛅'; condition='Partly cloudy'; bg1='#4facfe'; bg2='#00f2fe'; }
        else if (code <= 49) { icon='🌫️'; condition='Foggy'; bg1='#8e9eab'; bg2='#c8d6df'; }
        else if (code <= 69) { icon='🌧️'; condition='Rainy'; bg1='#1e3c72'; bg2='#2a5298'; }
        else if (code <= 79) { icon='❄️'; condition='Snowy'; bg1='#e0eafc'; bg2='#cfdef3'; }
        else if (code <= 82) { icon='🌦️'; condition='Rain showers'; bg1='#373b44'; bg2='#4286f4'; }
        else { icon='⛈️'; condition='Thunderstorm'; bg1='#0f0c29'; bg2='#302b63'; }
        var rec, recBg, recIcon;
        if (precip > 0.1) { rec='Rain expected — stay off the courts'; recBg='rgba(255,80,80,0.25)'; recIcon='🚫'; }
        else if (wind > 20) { rec='Very windy — tough serving conditions'; recBg='rgba(255,200,0,0.25)'; recIcon='💨'; }
        else if (temp > 95) { rec='Too hot — play early morning or evening'; recBg='rgba(255,150,0,0.25)'; recIcon='🥵'; }
        else if (temp < 45) { rec='Too cold — bundle up or skip today'; recBg='rgba(100,150,255,0.25)'; recIcon='🥶'; }
        else { rec='Perfect day to play tennis!'; recBg='rgba(255,255,255,0.25)'; recIcon='✅'; }
        var uvLabel = uv<=2?'Low':uv<=5?'Moderate':uv<=7?'High':'Very High';
        var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var todayIndex = new Date().getDay();
        function buildHourlyHtml(dayIdx) {
          var startHour = dayIdx*24, endHour = startHour+24, rows = '', playHours = [];
          for (var h = startHour; h < endHour; h++) {
            var hTime = hourly.time[h]; if (!hTime) continue;
            var hDate = new Date(hTime), hHour = hDate.getHours();
            var hLabel = hHour===0?'12 AM':hHour<12?hHour+' AM':hHour===12?'12 PM':(hHour-12)+' PM';
            var hTemp = Math.round(hourly.temperature_2m[h]), hWind = Math.round(hourly.wind_speed_10m[h]);
            var hHumidity = Math.round(hourly.relative_humidity_2m[h]), hUV = Math.round(hourly.uv_index[h]||0);
            var hIcon = getWeatherIcon(hourly.weather_code[h]);
            var isPlayable = hTemp>45 && hTemp<98 && hWind<20;
            if (isPlayable && hHour>=6 && hHour<=21) playHours.push(hLabel);
            rows += '<div style="display:grid;grid-template-columns:52px 22px 1fr 1fr 1fr 1fr;align-items:center;gap:4px;padding:6px 8px;border-radius:8px;background:rgba(255,255,255,'+(isPlayable?'0.15':'0.07')+');margin-bottom:4px">' +
              '<div style="font-size:11px;font-weight:600;color:#ffffff">'+hLabel+'</div><div style="font-size:14px">'+hIcon+'</div>' +
              '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.5)">Temp</div><div style="font-size:11px;font-weight:700;color:#ffffff">'+hTemp+'°F</div></div>' +
              '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.5)">Wind</div><div style="font-size:11px;font-weight:700;color:#ffffff">'+hWind+' mph</div></div>' +
              '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.5)">Humidity</div><div style="font-size:11px;font-weight:700;color:#ffffff">'+hHumidity+'%</div></div>' +
              '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.5)">UV</div><div style="font-size:11px;font-weight:700;color:#ffffff">'+hUV+'</div></div></div>';
          }
          var bestTimeHtml = playHours.length>0
            ? '<div style="background:rgba(74,222,128,0.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#ffffff"><strong>Best times to play:</strong> '+playHours.slice(0,4).join(', ')+(playHours.length>4?'...':'')+'</div>'
            : '<div style="background:rgba(248,113,113,0.2);border-radius:10px;padding:8px 12px;margin-bottom:10px;font-size:12px;color:#ffffff">No ideal play times today.</div>';
          return bestTimeHtml + rows;
        }
        var forecastRows = '';
        for (var i = 0; i < 7; i++) {
          var dayLabel = i===0?'Today':i===1?'Tomorrow':dayNames[(todayIndex+i)%7];
          var dayCode = daily.weather_code[i], dayIcon = getWeatherIcon(dayCode);
          var dayMax = Math.round(daily.temperature_2m_max[i]), dayMin = Math.round(daily.temperature_2m_min[i]);
          var dayWind = Math.round(daily.wind_speed_10m_max[i]), dayUV = Math.round(daily.uv_index_max[i]||0);
          var dayPrecip = (daily.precipitation_sum[i]||0).toFixed(1);
          var sunrise = formatTime(daily.sunrise[i]), sunset = formatTime(daily.sunset[i]);
          var playable = daily.precipitation_sum[i]<0.1 && daily.wind_speed_10m_max[i]<20 && daily.temperature_2m_max[i]<100 && daily.temperature_2m_min[i]>40;
          var hourlyHtml = buildHourlyHtml(i);
          var expandId = 'hourly_day_' + i;
          var rowBg = i===0?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.1)';
          forecastRows +=
            '<div style="margin-bottom:6px">' +
              '<div onclick="toggleHourly(\''+expandId+'\')" style="display:grid;grid-template-columns:70px 24px 1fr 1fr 1fr 1fr 1fr;align-items:center;gap:4px;padding:9px 10px;border-radius:12px;background:'+rowBg+';cursor:pointer">' +
                '<div style="font-size:12px;font-weight:'+(i===0?'700':'500')+';color:#ffffff">'+dayLabel+'</div>' +
                '<div style="font-size:18px;line-height:1">'+dayIcon+'</div>' +
                '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.55);margin-bottom:2px">Temp</div><div style="font-size:12px;font-weight:700;color:#ffffff">'+dayMax+'°<span style="opacity:0.6;font-weight:400">/'+dayMin+'°</span></div></div>' +
                '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.55);margin-bottom:2px">Wind</div><div style="font-size:12px;font-weight:700;color:#ffffff">'+dayWind+' mph</div></div>' +
                '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.55);margin-bottom:2px">UV</div><div style="font-size:12px;font-weight:700;color:#ffffff">'+dayUV+'</div></div>' +
                '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.55);margin-bottom:2px">Rain</div><div style="font-size:12px;font-weight:700;color:#ffffff">'+dayPrecip+'in</div></div>' +
                '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,0.55);margin-bottom:2px">Play?</div><div style="font-size:13px">'+(playable?'✅':'❌')+'</div></div>' +
              '</div>' +
              '<div id="'+expandId+'" style="display:none;background:rgba(0,0,0,0.2);border-radius:12px;padding:12px;margin-top:4px">' +
                '<div style="display:flex;gap:20px;margin-bottom:10px;padding:8px 12px;background:rgba(255,255,255,0.1);border-radius:10px">' +
                  '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px">🌅</span><div><div style="font-size:9px;color:rgba(255,255,255,0.6);text-transform:uppercase">Sunrise</div><div style="font-size:13px;font-weight:700;color:#ffffff">'+sunrise+'</div></div></div>' +
                  '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px">🌇</span><div><div style="font-size:9px;color:rgba(255,255,255,0.6);text-transform:uppercase">Sunset</div><div style="font-size:13px;font-weight:700;color:#ffffff">'+sunset+'</div></div></div>' +
                '</div>' +
                '<div style="font-size:9px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;color:rgba(255,255,255,0.55);margin-bottom:6px">Hourly Breakdown</div>' +
                hourlyHtml +
              '</div>' +
            '</div>';
        }
        weatherDiv.innerHTML =
          '<div style="background:linear-gradient(135deg,'+bg1+','+bg2+');border-radius:20px;padding:20px;margin-bottom:20px;overflow:hidden">' +
            '<div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:14px">Court Weather</div>' +
            '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">' +
              '<div style="font-size:52px;line-height:1">'+icon+'</div>' +
              '<div><div style="font-size:44px;font-weight:800;color:#ffffff;line-height:1">'+temp+'<span style="font-size:20px;font-weight:400;opacity:0.8">°F</span></div>' +
              '<div style="font-size:14px;color:rgba(255,255,255,0.9);font-weight:600;margin-top:4px">'+condition+'</div>' +

            '</div>' +
            '<div style="display:flex;align-items:center;gap:8px;background:'+recBg+';padding:10px 14px;border-radius:12px;margin-bottom:16px">' +
              '<span style="font-size:16px">'+recIcon+'</span><span style="font-size:13px;font-weight:600;color:#ffffff">'+rec+'</span>' +
            '</div>' +
            '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">' +

    function closeModal() {
      document.getElementById('courtModal').classList.remove('active');
      document.body.style.overflow = '';
      currentModalId = null;
    }

    function renderCourts() {
      var sortVal = document.getElementById('sortSelect').value;
      var filtered = allCourts.filter(function(c) {
        if (currentFilter === 'open') return c.isOpen === true;
        if (currentFilter === 'lights') return c.lights === true;
        return true;
      });
      if (sortVal === 'rating') filtered.sort(function(a, b) { return (b.rating||0)-(a.rating||0); });
      else if (sortVal === 'reviews') filtered.sort(function(a, b) { return (b.reviews||0)-(a.reviews||0); });
      var resultsGrid = document.getElementById('resultsGrid');
      if (filtered.length === 0) { resultsGrid.innerHTML = '<div class="error-msg">No courts match this filter.</div>'; return; }
      resultsGrid.innerHTML = '';
      filtered.forEach(function(court) {
        var openBadge = court.isOpen===true?'<span class="badge-open">Open Now</span>':court.isOpen===false?'<span class="badge-closed">Closed</span>':'<span class="surface-tag">Hours N/A</span>';
        var lightsBadge = court.lights ? '<span class="lights-badge">Lights</span>' : '';
        var isFav = !!favorites[court.id];
        var stars = court.rating ? '★'.repeat(Math.round(court.rating))+'☆'.repeat(5-Math.round(court.rating)) : '☆☆☆☆☆';
        var distanceBadge = '';
        if (window._userLat && court.lat) {
          var dist = getDistance(window._userLat, window._userLng, court.lat, court.lng);
          distanceBadge = '<span class="surface-tag">📍 ' + dist + ' mi</span>';
        }
        resultsGrid.innerHTML +=
          '<div class="court-card" id="court_card_' + court.id + '" onclick="openModal(\'' + court.id + '\')" style="cursor:pointer">' +
            '<div class="card-image">' +
              '<img src="' + court.photo + '" alt="' + court.name + '"/>' +
              '<span class="badge-free">Public</span>' +
              '<button class="heart-btn" id="heart_' + court.id + '" onclick="event.stopPropagation();toggleFavorite(\'' + court.id + '\')" style="color:' + (isFav?'#e74c3c':'#fff') + '">' + (isFav?'♥':'♡') + '</button>' +
            '</div>' +
            '<div class="card-body">' +
              '<h3 class="court-name">' + court.name + '</h3>' +
              '<p class="court-address">' + court.address + '</p>' +
              '<div class="card-row"><div class="stars">' + stars + '</div><span class="rating-count">(' + court.reviews + ' reviews)</span></div>' +
              '<div class="card-row">' + openBadge + '<span class="surface-tag">Tennis Court</span>' + lightsBadge + distanceBadge + '</div>' +
            '</div>' +
          '</div>';
      });
    }

    function initMap() {
      var map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 34.0522, lng: -118.2437 }, zoom: 12
      });
      window._courtMap = map;
      gService = new google.maps.places.PlacesService(map);
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('courtModal').addEventListener('click', function(e) {
        if (e.target === document.getElementById('courtModal')) closeModal();
      });
      updateSavedCount();
      var searchBtn = document.getElementById('searchBtn');
      var cityInput = document.getElementById('cityInput');
      var resultsGrid = document.getElementById('resultsGrid');
      searchBtn.addEventListener('click', function() {
        var city = cityInput.value.trim();
        if (!city) { cityInput.style.border = '2px solid red'; return; }
        cityInput.style.border = 'none';
        resultsGrid.innerHTML = '<div class="loading-msg">Searching for courts in <strong>' + city + '</strong>...</div>';
        document.getElementById('filterBar').style.display = 'none';
        var geocoder = new google.maps.Geocoder();
        geocoder.geocode({ address: city }, function(results, status) {
          if (status !== 'OK') { resultsGrid.innerHTML = '<div class="error-msg">City not found.</div>'; return; }
          var location = results[0].geometry.location;
          map.setCenter(location);
          gService.nearbySearch({ location: location, radius: 5000, keyword: 'tennis court' }, function(places, status) {
            if (status !== 'OK' || !places || !places.length) {
              resultsGrid.innerHTML = '<div class="error-msg">No courts found near ' + city + '.</div>'; return;
            }
            allCourts = [];
            var bounds = new google.maps.LatLngBounds();
            places.forEach(function(court, index) {
              var photo = court.photos ? court.photos[0].getUrl({ maxWidth: 400 }) : 'https://images.unsplash.com/photo-1554068865-24cecd4e34b8?w=400';
              var id = 'court_' + index;
              var courtObj = {
                id: id, name: court.name, address: court.vicinity, photo: photo,
                rating: court.rating||0, reviews: court.user_ratings_total||0,
                isOpen: court.opening_hours ? court.opening_hours.open_now : undefined,
                lights: hasLights(court), placeId: court.place_id,
                lat: court.geometry.location.lat(), lng: court.geometry.location.lng()
              };
              courtDataStore[id] = courtObj;
              allCourts.push(courtObj);
              addMarker(court, courtObj, map);
              bounds.extend(court.geometry.location);
            });
            map.fitBounds(bounds);
            document.getElementById('filterBar').style.display = 'flex';
            currentFilter = 'all';
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('filterAll').classList.add('active');
            renderCourts();
          });
        });
      });
    }
  </script>
